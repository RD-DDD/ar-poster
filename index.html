<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Poster</title>

  <!-- โหลด A-Frame และ AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="trackingMethod: best; sourceType: webcam;">
    
    <!-- ใช้ custom marker ของคุณ -->
    <a-marker type="pattern" url="poster.patt">
      <!-- วิดีโอลอยออกมาจากโปสเตอร์ -->
      <a-video
        src="vdo_pig_trim.mp4"
        width="1"
        height="0.6"
        position="0 0 0"
        rotation="-90 0 0">
      </a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
